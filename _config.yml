# Site settings
title: Angel Ayala | PhD in Computer Science # site title
description: >- # site description
  He is currently pursuing a Ph.D. at the Universidade de Pernambuco, Brazil,
  meet the developed projects at <a href="https://github.com/angel-ayala" target="_blank" rel="noopener">@github</a>.
lang: en-US # default lang
timezone: America/Fortaleza # set your timezone
image: assets/img/ogp.png # This image used for Open Graph more info https://ogp.me/
repo: https://github.com/angel-ayala/angel-ayala.github.io # site repo [optional]
mode: dark # default theme "dark" | "light"

# Profile settings
author:
  name: Angel Ayala # author name
  bio: >- # tell to the world
    👋 I received my Computer Science PhD at the Universidade de Pernambuco in Recife, Brazil.
    Developed studies addressed solving an autonomous object-goal navigation problem with a quadcopter using sample-efficient reinforcement learning algorithms.
    Previous research focused on perception for fire recognition with deep learning and computer vision approaches.
    Current research interest includes robotics, computer vision, and decision-making focused on multi-agent systems.
  username: angel-ayala # general username
  github: angel-ayala # github username
  twitter: # twitter username
  facebook: # facebook username
  email: aaam [at] ecomp.poli.br # email adress
  avatar: /assets/img/perfil_cuadrado.png # change with your own avatar
  affiliation: PhD. in Computer Science at Universidade de Pernambuco
  affiliation_url: https://w2.solucaoatrio.net.br/somos/upe-ppgec/index.php/pt/

# URL settings
url: "https://angel-ayala.github.io" #
baseurl:
permalink: /blog/:title/
google_analytics: G-76VH142E02  # leave it blank if not wish
fb_appid:

# Collection setting
collections:
  posts:
    output: true

# Markdown settings
markdown: kramdown
highlighter: rouge
kramdown:
  syntax_highlighter: rouge

# Default front matter
defaults:
  - scope:
      path: ""
    values:
      layout: post
      comments: false

# Jekyll Compose default front matter
jekyll_compose:
  post_default_front_matter:
    modified:
    tags: []
    description:
  draft_default_front_matter:
    modified:
    tags: []
    description:

# Homepage limit posts
number_of_posts: 5
number_of_publications: 3

# Build settings
# theme: klise
sass:
  style: compressed

include:
  - _redirects
  - .htaccess

exclude:
  - CNAME
  - Gemfile
  - Gemfile.lock
  - LICENSE
  - CHANGELOG.md
  - README.md
  - node_modules
  - CODE_OF_CONDUCT.md
  - CONTRIBUTING.md
  - lighthouse.png
  - klise-*.gem
  - klise.gemspec

# Plugins
plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-postfiles
